tools_allowlist:
  - git
  - gh
  - node
  - npx
  - pnpm
  - tsx

mcp_servers:
  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]

agents:
  default:
    model: kimi-code/kimi-for-coding
    tool: claude

  implementer:
    system_prompt: |
      You implement code for ai-model-registry — an MCP server that aggregates AI model information.
      Read VISION.md and CLAUDE.md every run.
      Write clean TypeScript. Use Hono and MCP SDK.
      Fetch from LiteLLM JSON, OpenRouter API, and Artificial Analysis.
      Commit with descriptive messages. Do not add yourself as author.
    model: kimi-code/kimi-for-coding
    tool: claude
    mcp_servers: ["ao", "context7"]

  reviewer:
    system_prompt: |
      You review PRs for ai-model-registry.
      Check: TypeScript types, error handling, caching logic, data source parsing.
      Verify model IDs are exact API-compatible strings.
      Use merge_pull_request MCP tool to merge good PRs.
    model: claude-haiku-4-5
    tool: claude
    mcp_servers: ["ao", "github"]

  planner:
    system_prompt: |
      You plan work for ai-model-registry.
      Read VISION.md for the full feature set.
      Check existing tasks and queue before creating new work.
      Prioritize: 1) data source fetchers 2) MCP tools 3) caching 4) tests.
    model: kimi-code/kimi-for-coding
    tool: claude
    mcp_servers: ["ao"]

  researcher:
    system_prompt: |
      You research AI model APIs and documentation.
      Find latest model IDs, pricing, context windows for all providers.
      Update data source fetchers with new models and endpoints.
      Verify API compatibility of model ID strings.
    model: claude-haiku-4-5
    tool: claude
    mcp_servers: ["ao", "context7"]

  product-owner:
    system_prompt: |
      You are the Product Owner for ai-model-registry.
      Read VISION.md every run. The goal is a complete MCP server covering all major AI providers.
      Create requirements and tasks for missing features.
      NEVER remove features. Only ADD and IMPROVE.
    model: claude-opus-4-6
    tool: claude
    mcp_servers: ["ao", "github"]

phases:
  implementation:
    mode: agent
    agent: implementer
    directive: "Implement the task. Write clean TypeScript, commit."
    capabilities:
      mutates_state: true

  push-branch:
    mode: command
    command:
      program: git
      args: ["push", "-u", "origin", "HEAD"]
      cwd_mode: task_root
      timeout_secs: 60

  create-pr:
    mode: command
    command:
      program: gh
      args: ["pr", "create", "--fill", "--base", "main"]
      cwd_mode: task_root
      timeout_secs: 60

  pr-review:
    mode: agent
    agent: reviewer
    directive: "Review this PR. Merge if good, request changes if not."

  pr-review-sweep:
    mode: agent
    agent: reviewer
    directive: "Pick ONE open PR. Review, merge, or close."
    capabilities:
      mutates_state: true

  work-planning:
    mode: agent
    agent: planner
    directive: "Check tasks and queue. Enqueue ready work. Respect queue limits."

  product-review:
    mode: agent
    agent: product-owner
    directive: "Review progress against VISION.md. Create tasks for gaps."
    capabilities:
      mutates_state: true

  research:
    mode: agent
    agent: researcher
    directive: "Research latest model IDs and API changes. Create tasks for updates."

  sync-main:
    mode: command
    command:
      program: git
      args: ["pull", "origin", "main", "--ff-only"]
      timeout_secs: 30

workflows:
  - id: standard
    phases: [implementation, push-branch, create-pr, pr-review]

  - id: scaffold
    phases: [implementation, push-branch, create-pr, pr-review]

  - id: quick-fix
    phases: [implementation, push-branch, create-pr, pr-review]

  - id: work-planner
    phases: [work-planning]

  - id: pr-reviewer
    phases: [pr-review-sweep]

  - id: product-review
    phases: [product-review]

  - id: research-scout
    phases: [research]

  - id: sync-main
    phases: [sync-main]

schedules:
  - id: work-planner
    cron: "*/5 * * * *"
    workflow_ref: work-planner
    enabled: true
  - id: pr-reviewer
    cron: "*/3 * * * *"
    workflow_ref: pr-reviewer
    enabled: true
  - id: sync-main
    cron: "*/5 * * * *"
    workflow_ref: sync-main
    enabled: true
  - id: product-review
    cron: "*/10 * * * *"
    workflow_ref: product-review
    enabled: true
  - id: research-scout
    cron: "0 */6 * * *"
    workflow_ref: research-scout
    enabled: true
